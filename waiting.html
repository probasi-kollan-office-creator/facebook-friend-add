<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>অপেক্ষা করুন...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #f0f2f5;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .spinner {
      width: 52px;
      height: 52px;
      border: 5px solid #e5e7eb;
      border-top: 5px solid #1877f2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">

  <!-- ফটো অংশ -->
  <div class="w-full max-w-md h-[35vh] overflow-hidden bg-white">
    <img 
      src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg"
      alt="Profile photo"
      class="w-full h-full object-cover"
    />
  </div>

  <!-- খুব কম ওভারল্যাপ + ন্যূনতম প্যাডিং -->
  <div class="w-full max-w-md -mt-4 bg-white rounded-t-2xl shadow-md px-5 pt-5 pb-6">

    <div class="spinner mb-4 mx-auto"></div>

    <h2 class="text-xl font-bold text-gray-900 mb-2 text-center">
      যাচাই হচ্ছে...
    </h2>

    <p class="text-gray-600 text-sm text-center leading-5 max-w-xs mx-auto">
      আপনার কোড যাচাই প্রক্রিয়া চলছে।
    </p>

    <p class="text-gray-600 text-sm text-center leading-5 mt-1 mx-auto">
      দয়া করে অপেক্ষা করুন।
    </p>

    <p class="text-gray-500 text-xs mt-4 text-center">
      পেজ বন্ধ করবেন না।
    </p>

  </div>

</body>
</html>
